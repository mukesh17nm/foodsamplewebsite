<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
    background: yellow;
    font-family: Arial;
}

.header{
    background: linear-gradient(to right, rgb(6,23,201), rgb(229,11,149));
    color:white;
    padding:15px;
    text-align:center;
    font-weight:bold;
}

.box{
    background:white;
    width:350px;
    margin:120px auto;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px gray;
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
    border-radius:8px;
    border:1px solid gray;
}

button{
    background:rgb(204,70,29);
    color:white;
    border:none;
    padding:10px 25px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="header">Food Website</div>

<div class="box">
<h2>Login</h2>

<input type="text" placeholder="Username"><br>
<input type="password" placeholder="Password"><br>

<button>Login</button>

<p>New user? <a href="signup.html">Sign Up</a></p>
</div>

</body>
</html>
